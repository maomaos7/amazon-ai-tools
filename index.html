<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Amazon AI Listing Dashboard - 2026 Edition</title>
    <style>
        :root { --amazon-orange: #FF9900; --bg-gray: #f6f6f6; --text-dark: #333; --high-priority: #e74c3c; --mid-priority: #f39c12; }
        body { font-family: "Segoe UI", Tahoma, sans-serif; background-color: var(--bg-gray); color: var(--text-dark); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        header { background: #232f3e; color: white; padding: 20px; border-radius: 8px 8px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .input-section { background: white; padding: 20px; border-radius: 0 0 8px 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        textarea, input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { background: var(--amazon-orange); color: white; border: none; padding: 15px 30px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; }
        button:hover { background: #e68a00; }
        
        /* 诊断卡片样式 */
        .card { background: white; border-radius: 8px; padding: 20px; margin-bottom: 20px; border-left: 10px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card.high { border-left-color: var(--high-priority); }
        .card.mid { border-left-color: var(--mid-priority); }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; color: white; margin-bottom: 10px; font-weight: bold; }
        .badge-high { background: var(--high-priority); }
        .badge-mid { background: var(--mid-priority); }
        
        .logic-box { background: #fffde7; padding: 15px; border-radius: 4px; margin: 10px 0; font-size: 14px; line-height: 1.5; }
        .logic-box b { color: #856404; }
        
        .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 15px; }
        .compare-item { padding: 15px; border: 1px solid #eee; border-radius: 4px; font-size: 14px; }
        .current { background: #fafafa; color: #777; }
        .suggested { background: #f0fdf4; border-color: #bbf7d0; color: #166534; }
        .tags { margin-top: 10px; }
        .tag { display: inline-block; background: #e0e0e0; padding: 2px 8px; border-radius: 4px; font-size: 11px; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1 style="margin:0; font-size: 22px;">Amazon AI 诊断看板</h1>
            <small>集成 A10 / COSMO / Rufus 算法逻辑</small>
        </div>
        <div id="status">V2.0 Ready</div>
    </header>

    <div class="input-section">
        <input type="text" id="asin" placeholder="输入 ASIN (例如: B0XXXXXXXX)">
        <textarea id="keywords" rows="3" placeholder="输入 ABA 核心词 & 竞品词 (用逗号隔开)"></textarea>
        <textarea id="listing" rows="4" placeholder="粘贴你目前的标题或五点描述..."></textarea>
        <button onclick="generateDashboard()">生成诊断报告</button>
    </div>

    <div id="dashboard">
        </div>
</div>

<script>
function generateDashboard() {
    const asin = document.getElementById('asin').value || "B012345678";
    const dashboard = document.getElementById('dashboard');
    dashboard.innerHTML = "正在深度建模中...";

    // 模拟 AI 处理逻辑（你可以之后接入 OpenAI API）
    setTimeout(() => {
        dashboard.innerHTML = `
            <div class="card high">
                <div class="badge badge-high">卖点1 · 高优先级</div>
                <div class="logic-box">
                    💡 <b>为什么这样优化更好？ (COSMO & Rufus)</b><br>
                    本次优化严格遵循COSMO意图建模原则：从<b>使用场景</b>(户外旅行/长途飞行)和<b>对象</b>(3-6岁幼儿)切入，明确痛点。通过融入“Compact Design”特征，直接链接到“不占空间”的结果。符合Rufus助手在回答“适合带上飞机吗？”时的提取逻辑。
                </div>
                <div class="compare-grid">
                    <div class="compare-item current">
                        <b>当前内容 (English)</b><br>
                        Includes 16 pieces doll accessories, easy to carry and store in the bag.
                    </div>
                    <div class="compare-item suggested">
                        <b>建议改写 (English)</b><br>
                        Perfect for <b>Toddlers & Travelers</b>: This 16-piece set includes a <b>foldable travel bag</b> that fits into any carry-on, ensuring your child stays entertained during <b>long flights or car rides</b> without creating a mess.
                    </div>
                </div>
                <div class="tags">
                    <span class="tag">#TravelToy</span> <span class="tag">#QuietPlay</span> <span class="tag">#RolePlay</span>
                </div>
            </div>

            <div class="card mid">
                <div class="badge badge-mid">卖点2 · 中优先级</div>
                <div class="logic-box">
                    💡 <b>Rufus 专属 FAQ 埋点</b><br>
                    针对买家最关心的兼容性问题，建议在高级 A+ 页面加入以下 QA。
                </div>
                <div class="compare-grid">
                    <div class="compare-item current">
                        <b>常见问题</b><br>
                        Is it for 12 inch dolls?
                    </div>
                    <div class="compare-item suggested">
                        <b>优化后的 FAQ 建议</b><br>
                        <b>Q: Does this kit fit 12-16 inch dolls like Baby Alive?</b><br>
                        A: Yes! Our accessories are universally designed to <b>perfectly fit 12, 14, and 16-inch dolls</b>. The magic bottles and diapers are tested for compatibility with most major doll brands.
                    </div>
                </div>
            </div>
        `;
    }, 800);
}
</script>

</body>
</html>
